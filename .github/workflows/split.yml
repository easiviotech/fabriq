name: Split Monorepo

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  split:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - { local: 'kernel',        remote: 'fabriq-kernel',        dir: 'packages/kernel' }
          - { local: 'storage',       remote: 'fabriq-storage',       dir: 'packages/storage' }
          - { local: 'observability', remote: 'fabriq-observability', dir: 'packages/observability' }
          - { local: 'tenancy',       remote: 'fabriq-tenancy',       dir: 'packages/tenancy' }
          - { local: 'streaming',     remote: 'fabriq-streaming',     dir: 'packages/streaming' }
          - { local: 'gaming',        remote: 'fabriq-gaming',        dir: 'packages/gaming' }
          - { local: 'skeleton',      remote: 'fabriq-skeleton',      dir: 'skeleton' }

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install splitsh-lite
        run: |
          curl -L https://github.com/splitsh/lite/releases/download/v1.0.1/lite_linux_amd64.tar.gz | tar -xz
          sudo mv splitsh-lite /usr/local/bin/splitsh-lite
          chmod +x /usr/local/bin/splitsh-lite

      - name: Split ${{ matrix.package.local }}
        env:
          SPLIT_TOKEN: ${{ secrets.SPLIT_TOKEN }}
        run: |
          SHA=$(splitsh-lite --prefix=${{ matrix.package.dir }})
          git remote add ${{ matrix.package.remote }} \
            "https://x-access-token:${SPLIT_TOKEN}@github.com/easiviotech/${{ matrix.package.remote }}.git" 2>/dev/null || true
          git push ${{ matrix.package.remote }} ${SHA}:refs/heads/main -f

      - name: Tag split repo (on version tag only)
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          SPLIT_TOKEN: ${{ secrets.SPLIT_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          SHA=$(splitsh-lite --prefix=${{ matrix.package.dir }})
          git remote add ${{ matrix.package.remote }} \
            "https://x-access-token:${SPLIT_TOKEN}@github.com/easiviotech/${{ matrix.package.remote }}.git" 2>/dev/null || true
          git tag -f ${TAG} ${SHA}
          git push ${{ matrix.package.remote }} ${TAG} -f
